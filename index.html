<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>六店爭霸戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap");
      body {
        font-family: "Noto Sans TC", sans-serif;
        background-color: #050505;
        color: #e2e8f0;
        overflow-x: hidden;
        width: 100%;
      }
      .animate-in {
        animation: fadeIn 0.3s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      /* 優化日期選擇器在外觀上的統一 */
      input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(1);
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const firebaseConfig = {
        apiKey: "AIzaSyANoY1GfwL6NK8Rkz_Z2ewIlIm-kfILrjc",
        authDomain: "mahjong-pro-v6-59f31.firebaseapp.com",
        projectId: "mahjong-pro-v6-59f31",
        storageBucket: "mahjong-pro-v6-59f31.firebasestorage.app",
        messagingSenderId: "921128919064",
        appId: "1:921128919064:web:5b9ed9899baddb041fa36d",
      };

      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();
      const appId = "mahjong-pro-v6-59f31";

      const { useState, useEffect, useMemo } = React;
      const BRANCHES = [
        "大林店",
        "八德店",
        "南崁店",
        "楊梅店",
        "觀音店",
        "中和店",
      ];
      const ADMIN_PASSWORD = "13491349";
      const PHONE_REGEX = /^09\d{8}$/;

      const Icon = ({ name, className = "w-4 h-4" }) => {
        useEffect(() => {
          if (window.lucide) window.lucide.createIcons();
        }, [name]);
        return <i data-lucide={name} className={className}></i>;
      };

      const App = () => {
        const [user, setUser] = useState(null);
        const [activeTab, setActiveTab] = useState("leaderboard");
        const [teams, setTeams] = useState([]);
        const [entries, setEntries] = useState([]);
        const [isSubmitting, setIsSubmitting] = useState(false);
        const [isAdmin, setIsAdmin] = useState(false);
        const [showPwdModal, setShowPwdModal] = useState(false);
        const [pwdInput, setPwdInput] = useState("");
        const [clickCount, setClickCount] = useState(0);
        const [formMsg, setFormMsg] = useState({ type: "", text: "" });

        const [newTeam, setNewTeam] = useState({
          name: "",
          branch: "",
          members: [{ name: "", phone: "" }],
        });
        const [newEntry, setNewEntry] = useState({
          teamId: "",
          phone: "",
          date: new Date().toISOString().split("T")[0],
          amount: "",
        });

        useEffect(() => {
          auth.signInAnonymously().catch(console.error);
          const unsub = auth.onAuthStateChanged((u) => setUser(u));
          return () => unsub();
        }, []);

        useEffect(() => {
          if (!user) return;
          const path = db
            .collection("artifacts")
            .doc(appId)
            .collection("public")
            .doc("data");
          const unsubT = path
            .collection("teams")
            .onSnapshot((s) =>
              setTeams(s.docs.map((d) => ({ id: d.id, ...d.data() }))),
            );
          const unsubE = path
            .collection("entries")
            .onSnapshot((s) =>
              setEntries(s.docs.map((d) => ({ id: d.id, ...d.data() }))),
            );
          return () => {
            unsubT();
            unsubE();
          };
        }, [user]);

        const getMultiplier = (d) =>
          [1, 2, 3, 4].includes(new Date(d).getDay()) ? 1.5 : 1.0;

        const rankings = useMemo(() => {
          return teams
            .filter((t) => t.status === "approved")
            .map((team) => {
              const tEntries = entries.filter(
                (e) => e.teamId === team.id && e.status === "approved",
              );
              const spent = tEntries.reduce((s, e) => s + Number(e.amount), 0);
              const pts = tEntries.reduce(
                (s, e) =>
                  s + (e.points || Number(e.amount) * getMultiplier(e.date)),
                0,
              );
              return { ...team, spent, pts };
            })
            .sort((a, b) => b.pts - a.pts);
        }, [teams, entries]);

        const branchStats = useMemo(() => {
          return BRANCHES.map((b) => ({
            name: b,
            total: entries
              .filter(
                (e) =>
                  e.status === "approved" &&
                  teams.find((t) => t.id === e.teamId)?.branch === b,
              )
              .reduce((s, e) => s + Number(e.amount), 0),
          })).sort((a, b) => b.total - a.total);
        }, [teams, entries]);

        const showMsg = (type, text) => {
          setFormMsg({ type, text });
          setTimeout(() => setFormMsg({ type: "", text: "" }), 5000);
        };

        const handleExportExcel = () => {
          const data = rankings.map((t, i) => ({
            名次: i + 1,
            戰隊名稱: t.name,
            所屬分店: t.branch,
            累積消費: t.spent,
            目前總積分: Math.floor(t.pts),
            隊員名單: t.members.map((m) => `${m.name}(${m.phone})`).join(", "),
          }));
          const ws = XLSX.utils.json_to_sheet(data);
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, "排行榜");
          XLSX.writeFile(
            wb,
            `六店爭霸戰報表_${new Date().toLocaleDateString()}.xlsx`,
          );
        };

        const handleClearAllData = async () => {
          if (!confirm("警告：這將會永久刪除所有資料！確定執行嗎？")) return;
          setIsSubmitting(true);
          try {
            const batch = db.batch();
            const path = db
              .collection("artifacts")
              .doc(appId)
              .collection("public")
              .doc("data");
            const tSnap = await path.collection("teams").get();
            tSnap.docs.forEach((doc) => batch.delete(doc.ref));
            const eSnap = await path.collection("entries").get();
            eSnap.docs.forEach((doc) => batch.delete(doc.ref));
            await batch.commit();
            showMsg("success", "數據已成功清空！");
          } catch (err) {
            showMsg("error", "清除失敗");
          }
          setIsSubmitting(false);
        };

        const handleRegister = async (e) => {
          e.preventDefault();
          const cleanName = newTeam.name.trim();
          if (!cleanName) return showMsg("error", "請輸入戰隊暱稱");
          if (
            teams.some((t) => t.name.toLowerCase() === cleanName.toLowerCase())
          )
            return showMsg("error", "戰隊名稱已存在");
          if (newTeam.members.some((m) => !PHONE_REGEX.test(m.phone)))
            return showMsg("error", "電話格式需為09開頭10位數");

          setIsSubmitting(true);
          try {
            await db
              .collection("artifacts")
              .doc(appId)
              .collection("public")
              .doc("data")
              .collection("teams")
              .add({
                ...newTeam,
                name: cleanName,
                status: "pending",
                createdAt: new Date().toISOString(),
              });
            showMsg("success", "報名成功！請聯繫闆娘。");
            setNewTeam({
              name: "",
              branch: "",
              members: [{ name: "", phone: "" }],
            });
            setActiveTab("leaderboard");
          } catch (e) {
            showMsg("error", "提交失敗");
          }
          setIsSubmitting(false);
        };

        const handleSubmitEntry = async (e) => {
          e.preventDefault();
          const target = teams.find((t) => t.id === newEntry.teamId);
          if (
            !target ||
            !target.members.some((m) => m.phone === newEntry.phone)
          )
            return showMsg("error", "電話不在該成員名單內");

          setIsSubmitting(true);
          try {
            await db
              .collection("artifacts")
              .doc(appId)
              .collection("public")
              .doc("data")
              .collection("entries")
              .add({
                ...newEntry,
                amount: Number(newEntry.amount),
                status: "pending",
                submittedAt: new Date().toISOString(),
              });
            showMsg("success", "回報成功，待審核。");
            setNewEntry({
              teamId: "",
              phone: "",
              date: new Date().toISOString().split("T")[0],
              amount: "",
            });
            setActiveTab("leaderboard");
          } catch (e) {
            showMsg("error", "回報失敗");
          }
          setIsSubmitting(false);
        };

        const adminAction = async (col, id, action, data) => {
          const ref = db
            .collection("artifacts")
            .doc(appId)
            .collection("public")
            .doc("data")
            .collection(col)
            .doc(id);
          try {
            if (action === "delete") await ref.delete();
            else if (action === "approve_entry") {
              const multiplier = getMultiplier(data.date);
              await ref.update({
                status: "approved",
                points: Math.floor(data.amount * multiplier),
              });
            } else await ref.update({ status: action });
            showMsg("success", "更新成功");
          } catch (e) {
            showMsg("error", "操作失敗");
          }
        };

        return (
          <div className="min-h-screen pb-24 w-full">
            <header className="p-6 border-b border-amber-600/20 text-center bg-black/50 backdrop-blur-md sticky top-0 z-10">
              <h1 className="text-2xl font-black text-amber-500 flex justify-center items-center gap-2">
                <Icon name="trophy" className="w-6 h-6" /> 六店爭霸戰
              </h1>
            </header>

            <main className="max-w-md mx-auto p-4 space-y-6 overflow-x-hidden">
              <nav className="flex p-1 bg-[#111] rounded-2xl border border-white/5 shadow-inner overflow-x-auto no-scrollbar">
                {[
                  { id: "leaderboard", icon: "trophy", label: "排行" },
                  { id: "branch", icon: "map-pin", label: "分店" },
                  { id: "register", icon: "users", label: "報名" },
                  { id: "submit", icon: "clipboard-list", label: "回報" },
                  ...(isAdmin
                    ? [{ id: "admin", icon: "shield-check", label: "管理" }]
                    : []),
                ].map((t) => (
                  <button
                    key={t.id}
                    onClick={() => setActiveTab(t.id)}
                    className={`flex-1 min-w-[64px] flex flex-col items-center py-2 rounded-xl transition-all ${activeTab === t.id ? "bg-amber-600 text-black shadow-lg" : "text-slate-500"}`}
                  >
                    <Icon name={t.icon} className="w-4 h-4 mb-1" />
                    <span className="text-[10px] font-bold">{t.label}</span>
                  </button>
                ))}
              </nav>

              {formMsg.text && (
                <div
                  className={`p-4 rounded-xl text-xs font-bold border animate-in flex items-center ${formMsg.type === "error" ? "bg-red-500/10 border-red-500/30 text-red-400" : "bg-green-500/10 border-green-500/30 text-green-400"}`}
                >
                  <Icon
                    name={
                      formMsg.type === "error" ? "alert-circle" : "check-circle"
                    }
                    className="mr-2 shrink-0"
                  />
                  <span className="break-all">{formMsg.text}</span>
                </div>
              )}

              {activeTab === "leaderboard" && (
                <div className="space-y-3 animate-in">
                  <div className="flex items-center gap-2 px-1">
                    <span className="w-1 h-3 bg-amber-500 rounded-full"></span>
                    <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-widest">
                      六店積分總榜
                    </h2>
                  </div>
                  {rankings.map((t, i) => (
                    <div
                      key={t.id}
                      className={`p-4 rounded-2xl border shadow-xl ${i === 0 ? "border-amber-400 bg-gradient-to-br from-amber-900/20 to-black" : "border-white/5 bg-[#0f0f0f]"}`}
                    >
                      <div className="flex justify-between items-center gap-2">
                        <div className="flex items-center gap-3 min-w-0">
                          <div
                            className={`w-8 h-8 shrink-0 rounded-lg flex items-center justify-center font-black ${i === 0 ? "bg-amber-500 text-black" : "bg-white/5 text-slate-500"}`}
                          >
                            {i + 1}
                          </div>
                          <div className="min-w-0">
                            <div className="font-bold text-sm truncate">
                              {t.name}{" "}
                              <span className="text-[8px] bg-white/10 px-1 rounded text-slate-400">
                                {t.branch}
                              </span>
                            </div>
                            <div className="text-[10px] text-slate-600">
                              實收: ${t.spent.toLocaleString()}
                            </div>
                          </div>
                        </div>
                        <div className="text-right shrink-0">
                          <div className="text-xl font-black text-amber-500">
                            {Math.floor(t.pts).toLocaleString()}
                          </div>
                          <div className="text-[8px] text-slate-700 uppercase font-bold tracking-tighter">
                            Points
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                  {rankings.length === 0 && (
                    <div className="text-center py-20 opacity-20 text-xs italic">
                      等待第一支戰隊誕生...
                    </div>
                  )}
                </div>
              )}

              {activeTab === "register" && (
                <form
                  onSubmit={handleRegister}
                  className="bg-[#0f0f0f] p-5 rounded-3xl border border-white/10 space-y-4 animate-in shadow-2xl overflow-hidden"
                >
                  <h2 className="font-black text-amber-500 flex items-center gap-2 text-lg">
                    <Icon name="users" /> 戰隊登記
                  </h2>
                  <input
                    type="text"
                    placeholder="輸入戰隊暱稱"
                    required
                    className="w-full bg-black border border-white/10 rounded-xl p-3 text-sm outline-none focus:border-amber-500"
                    value={newTeam.name}
                    onChange={(e) =>
                      setNewTeam({ ...newTeam, name: e.target.value })
                    }
                  />
                  <select
                    required
                    className="w-full bg-black border border-white/10 rounded-xl p-3 text-sm"
                    value={newTeam.branch}
                    onChange={(e) =>
                      setNewTeam({ ...newTeam, branch: e.target.value })
                    }
                  >
                    <option value="">-- 請選擇分店 --</option>
                    {BRANCHES.map((b) => (
                      <option key={b} value={b}>
                        {b}
                      </option>
                    ))}
                  </select>

                  <div className="space-y-3">
                    <div className="flex justify-between items-center px-1">
                      <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                        成員名單 ({newTeam.members.length}/5)
                      </label>
                    </div>
                    {newTeam.members.map((m, i) => (
                      <div
                        key={i}
                        className="grid grid-cols-[1fr_2fr_auto] gap-2 animate-in items-center"
                      >
                        <input
                          type="text"
                          placeholder="姓名"
                          required
                          className="w-full bg-black border border-white/10 rounded-xl p-3 text-xs min-w-0"
                          value={m.name}
                          onChange={(e) => {
                            const ms = [...newTeam.members];
                            ms[i].name = e.target.value;
                            setNewTeam({ ...newTeam, members: ms });
                          }}
                        />
                        <input
                          type="tel"
                          placeholder="09xxxxxxxx"
                          required
                          className="w-full bg-black border border-white/10 rounded-xl p-3 text-xs min-w-0"
                          value={m.phone}
                          onChange={(e) => {
                            const ms = [...newTeam.members];
                            ms[i].phone = e.target.value;
                            setNewTeam({ ...newTeam, members: ms });
                          }}
                        />
                        <div className="w-8 flex justify-end">
                          {i > 0 && (
                            <button
                              type="button"
                              onClick={() =>
                                setNewTeam({
                                  ...newTeam,
                                  members: newTeam.members.filter(
                                    (_, idx) => idx !== i,
                                  ),
                                })
                              }
                              className="text-red-500/70 hover:text-red-500 transition-colors"
                            >
                              <Icon name="x-circle" className="w-5 h-5" />
                            </button>
                          )}
                        </div>
                      </div>
                    ))}
                    {newTeam.members.length < 5 && (
                      <button
                        type="button"
                        onClick={() =>
                          setNewTeam({
                            ...newTeam,
                            members: [
                              ...newTeam.members,
                              { name: "", phone: "" },
                            ],
                          })
                        }
                        className="w-full py-2 border-2 border-dashed border-white/10 rounded-xl text-[10px] text-slate-500 font-bold hover:border-amber-500/50 hover:text-amber-500 transition-all"
                      >
                        + 增加隊員
                      </button>
                    )}
                  </div>
                  <button
                    type="submit"
                    disabled={isSubmitting}
                    className="w-full bg-amber-600 text-black font-black py-4 rounded-xl shadow-lg active:scale-95 transition-all mt-4"
                  >
                    {isSubmitting ? "提交中..." : "送出報名"}
                  </button>
                </form>
              )}

              {activeTab === "submit" && (
                <form
                  onSubmit={handleSubmitEntry}
                  className="bg-[#0f0f0f] p-6 rounded-3xl border border-white/10 space-y-5 animate-in shadow-2xl"
                >
                  <h2 className="font-black text-amber-500 flex items-center gap-2 text-lg">
                    <Icon name="clipboard-list" /> 消費回報
                  </h2>
                  <div className="space-y-4">
                    <div>
                      <label className="text-[10px] font-bold text-slate-500 uppercase ml-1 mb-1 block tracking-wider">
                        選擇戰隊
                      </label>
                      <select
                        required
                        className="w-full bg-black border border-white/10 rounded-xl p-4 text-sm"
                        value={newEntry.teamId}
                        onChange={(e) =>
                          setNewEntry({ ...newEntry, teamId: e.target.value })
                        }
                      >
                        <option value="">-- 選擇您的戰隊 --</option>
                        {teams
                          .filter((t) => t.status === "approved")
                          .map((t) => (
                            <option key={t.id} value={t.id}>
                              {t.name} (@{t.branch})
                            </option>
                          ))}
                      </select>
                    </div>

                    <div>
                      <label className="text-[10px] font-bold text-slate-500 uppercase ml-1 mb-1 block tracking-wider">
                        消費日期
                      </label>
                      <input
                        type="date"
                        required
                        className="w-full bg-black border border-white/10 rounded-xl p-4 text-sm text-white outline-none focus:border-amber-500"
                        value={newEntry.date}
                        onChange={(e) =>
                          setNewEntry({ ...newEntry, date: e.target.value })
                        }
                      />
                    </div>

                    <div>
                      <label className="text-[10px] font-bold text-slate-500 uppercase ml-1 mb-1 block tracking-wider">
                        驗證報名電話
                      </label>
                      <input
                        type="tel"
                        placeholder="09xxxxxxxx"
                        required
                        className="w-full bg-black border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-amber-500"
                        value={newEntry.phone}
                        onChange={(e) =>
                          setNewEntry({ ...newEntry, phone: e.target.value })
                        }
                      />
                    </div>

                    <div className="text-center py-5 px-4 bg-black rounded-3xl border border-amber-500/10">
                      <label className="text-[10px] text-amber-500 font-black block mb-2 uppercase tracking-widest">
                        本次消費金額
                      </label>
                      <div className="flex items-center justify-center gap-1 text-amber-500 font-black">
                        <span className="text-2xl">$</span>
                        <input
                          type="number"
                          required
                          placeholder="0"
                          className="bg-transparent text-5xl text-center outline-none w-32"
                          value={newEntry.amount}
                          onChange={(e) =>
                            setNewEntry({ ...newEntry, amount: e.target.value })
                          }
                        />
                      </div>
                    </div>
                  </div>
                  <button
                    type="submit"
                    disabled={isSubmitting}
                    className="w-full bg-green-700 text-white font-black py-4 rounded-xl shadow-lg active:scale-95"
                  >
                    {isSubmitting ? "提交中..." : "送出回報"}
                  </button>
                </form>
              )}

              {activeTab === "admin" && isAdmin && (
                <div className="space-y-6 animate-in pb-10">
                  <div className="grid grid-cols-2 gap-3">
                    <button
                      onClick={handleExportExcel}
                      className="bg-blue-600 text-white p-4 rounded-2xl flex flex-col items-center justify-center gap-1 font-bold text-xs shadow-lg shadow-blue-900/20"
                    >
                      <Icon name="file-spreadsheet" /> 匯出報表
                    </button>
                    <button
                      onClick={handleClearAllData}
                      className="bg-red-900/30 text-red-500 border border-red-500/20 p-4 rounded-2xl flex flex-col items-center justify-center gap-1 font-bold text-xs"
                    >
                      <Icon name="trash-2" /> 清空數據
                    </button>
                  </div>

                  <div className="space-y-4">
                    <h3 className="text-[10px] font-black text-slate-500 px-1 uppercase tracking-widest">
                      待審核戰隊 (
                      {teams.filter((t) => t.status === "pending").length})
                    </h3>
                    {teams
                      .filter((t) => t.status === "pending")
                      .map((t) => (
                        <div
                          key={t.id}
                          className="p-4 bg-[#111] rounded-2xl border border-white/5 space-y-4 shadow-xl"
                        >
                          <div className="flex justify-between items-start">
                            <div>
                              <div className="font-black text-white">
                                {t.name}
                              </div>
                              <div className="text-[10px] text-amber-500 font-bold">
                                {t.branch}
                              </div>
                            </div>
                            <div className="flex gap-2">
                              <button
                                onClick={() =>
                                  adminAction("teams", t.id, "approved")
                                }
                                className="bg-amber-600 text-black px-3 py-1.5 rounded-lg text-[10px] font-black"
                              >
                                核准
                              </button>
                              <button
                                onClick={() =>
                                  adminAction("teams", t.id, "delete")
                                }
                                className="bg-red-500 text-white px-3 py-1.5 rounded-lg text-[10px] font-black"
                              >
                                刪除
                              </button>
                            </div>
                          </div>
                          <div className="text-[9px] text-slate-500 bg-black/40 p-3 rounded-lg grid grid-cols-1 gap-1">
                            {t.members.map((m, i) => (
                              <div key={i} className="flex justify-between">
                                <span>{m.name}</span>
                                <span>{m.phone}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                  </div>

                  <div className="space-y-4">
                    <h3 className="text-[10px] font-black text-slate-500 px-1 uppercase tracking-widest">
                      待核對消費 (
                      {entries.filter((e) => e.status === "pending").length})
                    </h3>
                    {entries
                      .filter((e) => e.status === "pending")
                      .map((e) => {
                        const multiplier = getMultiplier(e.date);
                        return (
                          <div
                            key={e.id}
                            className="p-4 bg-[#111] rounded-2xl border border-white/5 flex justify-between items-center shadow-xl"
                          >
                            <div className="min-w-0 pr-2">
                              <div className="text-[10px] text-slate-400 font-bold truncate">
                                {teams.find((t) => t.id === e.teamId)?.name}
                              </div>
                              <div className="font-black text-green-500 text-lg">
                                ${e.amount.toLocaleString()}
                              </div>
                              <div className="text-[8px] text-slate-600 truncate">
                                {e.date} ({multiplier}x)
                              </div>
                            </div>
                            <div className="flex gap-1 shrink-0">
                              <button
                                onClick={() =>
                                  adminAction(
                                    "entries",
                                    e.id,
                                    "approve_entry",
                                    e,
                                  )
                                }
                                className="bg-green-600 text-white px-3 py-2 rounded-lg text-[10px] font-black shadow-lg"
                              >
                                通過
                              </button>
                              <button
                                onClick={() =>
                                  adminAction("entries", e.id, "delete")
                                }
                                className="bg-slate-800 text-red-500 px-3 py-2 rounded-lg text-[10px] font-black"
                              >
                                拒絕
                              </button>
                            </div>
                          </div>
                        );
                      })}
                  </div>
                </div>
              )}

              {activeTab === "branch" && (
                <div className="space-y-3 animate-in">
                  <div className="bg-blue-600/10 border border-blue-500/20 p-4 rounded-2xl shadow-inner">
                    <div className="flex items-center gap-2 text-blue-400 font-bold text-sm mb-1">
                      <Icon name="award" className="w-5 h-5" /> 分店榮譽賽
                    </div>
                    <p className="text-[10px] text-slate-500 leading-relaxed">
                      冠軍分店之所有報名成員，可獲得 2 小時免費續時券乙張。
                    </p>
                  </div>
                  {branchStats.map((b, i) => (
                    <div
                      key={b.name}
                      className="flex justify-between p-4 bg-[#0f0f0f] rounded-2xl border border-white/5 items-center shadow-lg transition-transform active:scale-[0.99]"
                    >
                      <div className="flex items-center gap-4">
                        <div
                          className={`w-6 h-6 rounded flex items-center justify-center text-[10px] font-bold ${i === 0 ? "bg-blue-600 text-white" : "bg-white/5 text-slate-600"}`}
                        >
                          {i + 1}
                        </div>
                        <span className="font-bold text-sm">{b.name}</span>
                      </div>
                      <span className="text-white font-black text-lg tracking-tighter">
                        ${b.total.toLocaleString()}
                      </span>
                    </div>
                  ))}
                </div>
              )}
            </main>

            {showPwdModal && (
              <div className="fixed inset-0 z-50 bg-black/98 flex items-center justify-center p-6 backdrop-blur-xl animate-in">
                <div className="bg-[#111] p-8 rounded-[40px] w-full max-w-xs text-center border border-amber-600/30 shadow-2xl">
                  <Icon
                    name="lock"
                    className="w-12 h-12 text-amber-500 mx-auto mb-4"
                  />
                  <h3 className="text-white font-black text-xl mb-6 uppercase tracking-tighter">
                    管理員驗證
                  </h3>
                  <form
                    onSubmit={(e) => {
                      e.preventDefault();
                      if (pwdInput === ADMIN_PASSWORD) {
                        setIsAdmin(true);
                        setShowPwdModal(false);
                        setActiveTab("admin");
                      } else {
                        setPwdInput("");
                        alert("密碼錯誤");
                      }
                    }}
                  >
                    <input
                      type="password"
                      autoFocus
                      className="w-full bg-black border border-white/10 rounded-2xl p-4 text-center text-2xl tracking-[0.4em] outline-none focus:border-amber-500 mb-6"
                      value={pwdInput}
                      onChange={(e) => setPwdInput(e.target.value)}
                      placeholder="••••"
                    />
                    <button className="w-full bg-amber-600 text-black font-black py-4 rounded-2xl shadow-xl">
                      登入系統
                    </button>
                    <button
                      type="button"
                      onClick={() => {
                        setShowPwdModal(false);
                        setClickCount(0);
                      }}
                      className="text-slate-600 text-xs mt-6"
                    >
                      取消
                    </button>
                  </form>
                </div>
              </div>
            )}

            <footer className="fixed bottom-0 left-0 right-0 p-4 bg-black/90 backdrop-blur-md flex justify-between items-center text-[9px] text-slate-800 font-black border-t border-white/5 z-30 uppercase tracking-widest">
              <div className="flex items-center gap-1.5 px-2">
                <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#22c55e]"></div>
                <span>SERVER_STABLE</span>
              </div>
              <div
                onClick={() => {
                  const n = clickCount + 1;
                  setClickCount(n);
                  if (n >= 5) setShowPwdModal(true);
                }}
                className="cursor-default select-none px-2 active:text-slate-700 transition-colors"
              >
                V6.3_DATE_TRACKING
              </div>
            </footer>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
